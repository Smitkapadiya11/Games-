<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fusion Geji | Reflex Challenger</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    
    <div class="game-container">
        
        <header class="scoreboard">
            <div class="score-card player">
                <span class="label">YOU</span>
                <span class="score" id="score-player">0</span>
            </div>
            <div class="score-card bot1">
                <span class="label">BOT α</span>
                <span class="score" id="score-bot1">0</span>
            </div>
            <div class="score-card bot2">
                <span class="label">BOT β</span>
                <span class="score" id="score-bot2">0</span>
            </div>
        </header>

        <div class="grid" id="game-grid">
            <!-- Grid boxes generated by JS -->
        </div>

    </div>

    <div class="overlay" id="start-screen">
        <div class="glass-panel">
            <div class="logo-wrapper">
                <div class="logo-circle"></div>
                <div class="logo-circle delay"></div>
                <h1>FUSION <span>GEJI</span></h1>
            </div>
            <p>A fast-paced reflex battle.</p>
            <p class="subtitle">Click the glowing box before Bot α or Bot β can react.</p>
            <div class="rules">
                <div class="rule"><span class="dot player-dot"></span> You</div>
                <div class="rule"><span class="dot bot1-dot"></span> Bot α (~600ms)</div>
                <div class="rule"><span class="dot bot2-dot"></span> Bot β (~500ms)</div>
            </div>
            <button id="start-btn">Start Game</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
